{% extends 'base.html' %}
{% block title %}Общий товар — WMS{% endblock %}
{% block content %}
<div class="topbar">
  <h2>Общий товар</h2>
  <div class="topbar-right">
    <form method="POST" action="/update-rate" style="display:flex;align-items:center;gap:8px;">
      <label style="margin:0;white-space:nowrap;font-size:11px;color:#9a9a9a;">Курс GEL</label>
      <input type="number" name="gel_rate" value="{{ gel_rate }}" step="0.01" style="width:75px;padding:6px 8px;font-size:12px;">
      <button type="submit" class="btn btn-outline btn-sm">Обновить</button>
    </form>
    <a href="{{ url_for('add_phone') }}" class="btn btn-primary btn-sm">+ Добавить</a>
  </div>
</div>

<div class="content">
  <div class="filter-bar" id="catalogFilters">
    <input type="text" id="fImei" placeholder="Поиск по IMEI" oninput="loadCatalog()">
    <select id="fModel" onchange="loadCatalog()">
      <option value="">Модель: все</option>
      {% for m in models %}<option value="{{ m.id }}">{{ m.name }}</option>{% endfor %}
    </select>
    <select id="fStore" onchange="loadCatalog()">
      <option value="">Все магазины</option>
      {% for s in stores %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
    </select>
    <select id="fState" onchange="loadCatalog()">
      <option value="">Состояние: все</option>
      <option>НОВАЯ</option><option>REF.</option><option>Б/У</option>
    </select>
    <div class="filter-actions">
      <button class="btn btn-outline btn-sm" onclick="resetFilters()">Сброс</button>
      <button class="btn btn-primary btn-sm" onclick="exportCatalog()">Экспорт CSV</button>
    </div>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Модель</th><th>Количество</th><th>Новая</th><th>REF.</th><th>Б/У</th></tr>
        </thead>
        <tbody id="catalogBody">
          <tr><td colspan="5" style="text-align:center;padding:30px;color:#9a9a9a;">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let catalogData = [];

function loadCatalog() {
  const params = new URLSearchParams({
    imei: document.getElementById('fImei').value,
    model: document.getElementById('fModel').value,
    store: document.getElementById('fStore').value,
    state: document.getElementById('fState').value,
  });
  fetch('/api/catalog?' + params)
    .then(r => r.json())
    .then(data => { catalogData = data; renderCatalog(data); });
}

function renderCatalog(data) {
  const tbody = document.getElementById('catalogBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#9a9a9a;">Товаров не найдено</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((g, i) => `
    <tr class="group-row" onclick="toggleGroup(${i}, ${g.model_id}, '${g.model.replace(/'/g,"\\'")}')">
      <td>${g.model}</td>
      <td style="color:#2563eb;font-family:'IBM Plex Mono',monospace;font-weight:700;">${g.count}</td>
      <td>${g.new}</td>
      <td>${g.ref}</td>
      <td>${g.bu}</td>
    </tr>
    ${g.phones.map(p => `
    <tr class="detail-row" id="dr-${i}-${p.imei.replace(/[^a-z0-9]/gi,'_')}">
      <td colspan="5">
        <div style="display:flex;gap:40px;padding:2px 14px;font-size:12px;">
          <span><a href="#" class="imei-link" onclick="openModal('${p.imei}');return false;">${p.imei}</a></span>
          <span style="color:#5a5a5a;">${p.store}</span>
          <span>${badgeHtml(p.state)}</span>
          <span style="font-family:'IBM Plex Mono',monospace;">${p.price_gel || '—'} ₾</span>
          <span style="color:#9a9a9a;">${p.date_in || ''}</span>
        </div>
      </td>
    </tr>`).join('')}
  `).join('');
}

const expanded = {};
function toggleGroup(i, modelId, modelName) {
  const rows = document.querySelectorAll(`[id^="dr-${i}-"]`);
  expanded[i] = !expanded[i];
  rows.forEach(r => r.classList.toggle('visible', expanded[i]));
}

function resetFilters() {
  ['fImei','fModel','fStore','fState'].forEach(id => document.getElementById(id).value = '');
  loadCatalog();
}

function exportCatalog() {
  const store = document.getElementById('fStore').value;
  const model = document.getElementById('fModel').value;
  const state = document.getElementById('fState').value;
  const imei = document.getElementById('fImei').value;

  let csv = '\ufeffМодель,IMEI,Магазин,Состояние,Цена ₾,Дата приёма\n';
  catalogData.forEach(g => {
    g.phones.filter(p =>
      (!store || p.store_id == store) &&
      (!state || p.state === state) &&
      (!imei || p.imei.includes(imei))
    ).forEach(p => {
      csv += `"${g.model}",${p.imei},${p.store},${p.state},${p.price_gel},${p.date_in}\n`;
    });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = 'catalog.csv'; a.click();
}

function badgeHtml(state) {
  const cls = state==='НОВАЯ'?'badge-new':state==='REF.'?'badge-ref':'badge-bu';
  return `<span class="badge ${cls}">${state}</span>`;
}

loadCatalog();
</script>
{% endblock %}

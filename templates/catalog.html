{% extends 'base.html' %}
{% block title %}Телефоны — WMS{% endblock %}
{% block content %}
<div class="topbar">
  <h2>Телефоны</h2>
  <div class="topbar-right">
    <span style="font-size:12px;color:#9a9a9a;">Курс GEL: <b>{{ gel_rate }}</b></span>
    {% if session.role in ('admin','manager','editor') %}
    <a href="{{ url_for('import_phones') }}" class="btn btn-primary btn-sm">+ Добавить товар</a>
    {% endif %}
  </div>
</div>
<div class="content">
  <div class="filter-bar">
    <input type="text" id="fImei" placeholder="Поиск по IMEI" oninput="loadCatalog()">
    <select id="fModel" onchange="loadCatalog()">
      <option value="">Модель: все</option>
      {% for m in models %}<option value="{{ m.id }}">{{ m.name }}</option>{% endfor %}
    </select>
    <select id="fStore" onchange="loadCatalog()">
      <option value="">Все магазины</option>
      {% for s in stores %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
    </select>
    <select id="fState" onchange="loadCatalog()">
      <option value="">Состояние: все</option>
      {% for st in states %}<option>{{ st }}</option>{% endfor %}
    </select>
    <div class="filter-actions">
      <button class="btn btn-outline btn-sm" onclick="resetFilters()">Сброс</button>
      <button class="btn btn-primary btn-sm" onclick="exportCatalog()">Экспорт CSV</button>
    </div>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Модель</th><th>Количество</th></tr>
        </thead>
        <tbody id="catalogBody">
          <tr><td colspan="2" style="text-align:center;padding:30px;color:#9a9a9a;">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let catalogData = [];

function loadCatalog() {
  const params = new URLSearchParams({
    imei: document.getElementById('fImei').value,
    model: document.getElementById('fModel').value,
    store: document.getElementById('fStore').value,
    state: document.getElementById('fState').value,
  });
  fetch('/api/catalog?' + params)
    .then(r => r.json())
    .then(data => { catalogData = data; renderCatalog(data); });
}

function renderCatalog(data) {
  const tbody = document.getElementById('catalogBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;padding:30px;color:#9a9a9a;">Товаров не найдено</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((g, i) => {
    const detailRows = g.phones.map(p => `
      <tr class="detail-row" id="dr-${i}-${p.imei}">
        <td colspan="2">
          <div style="display:flex;gap:32px;padding:4px 28px;font-size:12px;align-items:center;">
            <span><a href="#" class="imei-link" onclick="openModal('${p.imei}');return false;">${p.imei}</a></span>
            <span style="color:#5a5a5a;min-width:90px;">${p.store}</span>
            <span>${badgeHtml(p.state)}</span>
            <span style="font-family:'IBM Plex Mono',monospace;min-width:80px;">${p.price_gel > 0 ? p.price_gel.toFixed(2) + ' ₾' : '—'}</span>
            <span style="color:#9a9a9a;">${p.date_in || ''}</span>
          </div>
        </td>
      </tr>`).join('');

    return `
      <tr class="group-row" onclick="toggleGroup(${i})">
        <td><b>${g.model}</b></td>
        <td style="color:#2563eb;font-family:'IBM Plex Mono',monospace;font-weight:700;">${g.count}</td>
      </tr>
      ${detailRows}`;
  }).join('');
}

const expanded = {};
function toggleGroup(i) {
  const rows = document.querySelectorAll(`[id^="dr-${i}-"]`);
  expanded[i] = !expanded[i];
  rows.forEach(r => r.classList.toggle('visible', expanded[i]));
}

function resetFilters() {
  ['fImei','fModel','fStore','fState'].forEach(id => document.getElementById(id).value = '');
  loadCatalog();
}

function exportCatalog() {
  let tsv = '\ufeffМодель\tIMEI\tМагазин\tСостояние\tЦена ₾\tДата приёма\n';
  catalogData.forEach(g => {
    g.phones.forEach(p => {
      tsv += [g.model, p.imei, p.store, p.state, p.price_gel, p.date_in].join('\t') + '\n';
    });
  });
  downloadFile(tsv, 'phones.csv');
}

function downloadFile(content, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type:'text/tab-separated-values;charset=utf-8'}));
  a.download = filename; a.click();
}

function badgeHtml(state) {
  const cls = state==='НОВАЯ'?'badge-new':state==='REF.'?'badge-ref':'badge-bu';
  return `<span class="badge ${cls}">${state}</span>`;
}

loadCatalog();
</script>
{% endblock %}

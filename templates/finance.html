{% extends 'base.html' %}
{% block title %}Общий товар — WMS{% endblock %}
{% block content %}
<div class="topbar">
  <h2>Общий товар</h2>
  <div class="topbar-right">
    <button class="btn btn-primary btn-sm" onclick="exportFinance()">Экспорт Excel</button>
  </div>
</div>
<div class="content">

  <div class="filter-bar">
    <input type="text" id="fImei" placeholder="Поиск IMEI" oninput="loadFinance()">
    <select id="fStore" onchange="loadFinance()">
      <option value="">Все магазины</option>
      {% for s in stores %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
    </select>
    <select id="fModel" onchange="loadFinance()">
      <option value="">Все модели</option>
      {% for m in models %}<option value="{{ m.id }}">{{ m.name }}</option>{% endfor %}
    </select>
    <select id="fState" onchange="loadFinance()">
      <option value="">Состояние: все</option>
      {% for st in states %}<option>{{ st }}</option>{% endfor %}
    </select>
    <div class="filter-actions">
      <button class="btn btn-outline btn-sm" onclick="resetFilters()">Сброс</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <!-- МАССОВАЯ НАЦЕНКА -->
  <div class="card" style="margin-bottom:14px;">
    <div class="card-body">
      <form method="POST" action="/finance/bulk" id="bulkForm" style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;">
        <input type="hidden" name="store" id="bmStore">
        <input type="hidden" name="model" id="bmModel">
        <input type="hidden" name="state" id="bmState">
        <div class="form-group">
          <label>Массовая наценка %</label>
          <input type="number" name="markup" value="20" step="0.1" style="width:110px;">
        </div>
        <div class="form-group">
          <label>Курс GEL (₾ за $1)</label>
          <input type="number" name="gel_rate" value="{{ gel_rate }}" step="0.01" style="width:100px;">
        </div>
        <button type="submit" class="btn btn-success">Применить к выборке</button>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Модель</th><th>IMEI</th><th>Магазин</th><th>Состояние</th>
            <th>Себест. $</th><th>Наценка %</th><th>Курс</th><th>Цена ₾</th><th>Потенц. прибыль ₾</th>
          </tr>
        </thead>
        <tbody id="financeBody">
          <tr><td colspan="9" style="text-align:center;padding:30px;color:#9a9a9a;">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadFinance() {
  const params = new URLSearchParams({
    imei: document.getElementById('fImei').value,
    store: document.getElementById('fStore').value,
    model: document.getElementById('fModel').value,
    state: document.getElementById('fState').value,
  });
  document.getElementById('bmStore').value = document.getElementById('fStore').value;
  document.getElementById('bmModel').value = document.getElementById('fModel').value;
  document.getElementById('bmState').value = document.getElementById('fState').value;

  fetch('/api/finance?' + params)
    .then(r => r.json())
    .then(d => renderFinance(d));
}

function renderFinance(d) {
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box"><div class="lbl">Позиций на складе</div><div class="val blue">${d.count}</div></div>
    <div class="stat-box"><div class="lbl">Сумма цен ₾</div><div class="val green">${d.total_price.toFixed(2)}</div></div>
    <div class="stat-box"><div class="lbl">Себест. в ₾</div><div class="val orange">${d.total_cost.toFixed(2)}</div></div>
    <div class="stat-box"><div class="lbl">Потенц. прибыль ₾</div><div class="val ${d.total_profit>=0?'green':'orange'}">${d.total_profit.toFixed(2)}</div></div>
  `;
  if (!d.phones.length) {
    document.getElementById('financeBody').innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#9a9a9a;">Нет данных</td></tr>';
    return;
  }
  document.getElementById('financeBody').innerHTML = d.phones.map(p => {
    const badge = p.state==='НОВАЯ'?'badge-new':p.state==='REF.'?'badge-ref':'badge-bu';
    const profit = (p.price_gel - p.cost_usd * p.gel_rate).toFixed(2);
    const profitCls = parseFloat(profit) >= 0 ? 'profit-pos' : 'profit-neg';
    return `<tr>
      <td>${p.model}</td>
      <td><a href="#" class="imei-link" onclick="openModal('${p.imei}');return false;">${p.imei}</a></td>
      <td>${p.store}</td>
      <td><span class="badge ${badge}">${p.state}</span></td>
      <td style="font-family:'IBM Plex Mono',monospace;">${(p.cost_usd||0).toFixed(2)}</td>
      <td>${p.markup_pct||0}%</td>
      <td>${p.gel_rate||2.7}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:600;">${(p.price_gel||0).toFixed(2)}</td>
      <td class="${profitCls}" style="font-family:'IBM Plex Mono',monospace;">${profit}</td>
    </tr>`;
  }).join('');
}

function resetFilters() {
  ['fImei','fStore','fModel','fState'].forEach(id => document.getElementById(id).value = '');
  loadFinance();
}

function exportFinance() {
  const params = new URLSearchParams({
    tab: 'finance',
    imei: document.getElementById('fImei').value,
    store: document.getElementById('fStore').value,
    model: document.getElementById('fModel').value,
    state: document.getElementById('fState').value,
  });
  window.location = '/reports/export?' + params;
}

loadFinance();
</script>
{% endblock %}

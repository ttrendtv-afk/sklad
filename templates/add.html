{% extends 'base.html' %}
{% block title %}Добавить товар — WMS{% endblock %}
{% block content %}
<div class="topbar"><h2>Добавить товар</h2></div>
<div class="content">
<div class="card" style="max-width:660px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-row cols-2" style="margin-bottom:12px;">
        <div class="form-group">
          <label>Модель *</label>
          <select name="model_id" required>
            <option value="">Выберите модель</option>
            {% for m in models %}<option value="{{ m.id }}">{{ m.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Магазин *</label>
          <select name="store_id" required>
            {% for s in stores %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row cols-2" style="margin-bottom:12px;">
        <div class="form-group">
          <label>IMEI *</label>
          <input type="text" name="imei" required maxlength="20" placeholder="351111111111111" style="font-family:'IBM Plex Mono',monospace;">
        </div>
        <div class="form-group">
          <label>Состояние</label>
          <select name="state">
            {% for st in states %}<option>{{ st }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row cols-3" style="margin-bottom:12px;">
        <div class="form-group">
          <label>Себестоимость $</label>
          <input type="number" name="cost_usd" id="cost" step="0.01" placeholder="0" oninput="calcPrice()">
        </div>
        <div class="form-group">
          <label>Наценка %</label>
          <input type="number" name="markup_pct" id="markup" value="20" step="0.1" oninput="calcPrice()">
        </div>
        <div class="form-group">
          <label>Курс GEL</label>
          <input type="number" name="gel_rate" id="rate" value="{{ gel_rate }}" step="0.01" oninput="calcPrice()">
        </div>
      </div>
      <div class="form-row cols-2" style="margin-bottom:12px;">
        <div class="form-group">
          <label>Цена ₾ (авто)</label>
          <input type="number" name="price_gel" id="price" step="0.01" style="border-color:#86efac;">
        </div>
        <div class="form-group">
          <label>Дата приёма</label>
          <input type="date" name="date_in" value="{{ today }}">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:18px;">
        <label>Заметки</label>
        <input type="text" name="notes" placeholder="Комплект, состояние и т.п.">
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Добавить</button>
        <button type="submit" name="another" value="1" class="btn btn-outline">Добавить ещё</button>
        <a href="{{ url_for('catalog') }}" class="btn btn-outline">Отмена</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
{% block scripts %}
<script>
function calcPrice() {
  const cost = parseFloat(document.getElementById('cost').value) || 0;
  const markup = parseFloat(document.getElementById('markup').value) || 0;
  const rate = parseFloat(document.getElementById('rate').value) || 0;
  if (cost && rate) document.getElementById('price').value = (cost*(1+markup/100)*rate).toFixed(2);
}
</script>
{% endblock %}

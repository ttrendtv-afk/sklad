<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — WMS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f4f0;font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:40px;width:360px;max-width:95vw;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.brand{margin-bottom:28px;}
.brand h1{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#1a1a1a;letter-spacing:1px;}
.brand h1 span{color:#2563eb;}
.brand p{font-size:12px;color:#9a9a9a;margin-top:4px;}
label{font-size:11px;font-weight:600;color:#5a5a5a;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;background:#f5f4f0;border:1px solid #e0ddd6;border-radius:7px;color:#1a1a1a;font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:10px 13px;outline:none;margin-bottom:14px;transition:.15s;}
input:focus{border-color:#2563eb;background:#fff;}
button{width:100%;background:#2563eb;color:#fff;border:none;border-radius:7px;padding:12px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
button:hover{background:#1d4ed8;}
.flash{padding:10px 13px;border-radius:7px;font-size:12px;margin-bottom:14px;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;}
.hint{font-size:11px;color:#9a9a9a;text-align:center;margin-top:14px;}
</style>
</head>
<body>
<div class="box">
  <div class="brand">
    <h1>WMS <span>Склад</span></h1>
    <p>Система управления складом</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <label>Логин</label>
    <input type="text" name="username" required autofocus>
    <label>Пароль</label>
    <input type="password" name="password" required>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>

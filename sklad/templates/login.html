<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — Склад Телефонов</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--s:#12121a;--b:#2a2a40;--ac:#00e5ff;--ac2:#ff6b35;--tx:#e8e8f0;--mu:#6a6a8a;--rd:#ff3366;--gr:#00ff88;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:var(--s);border:1px solid var(--b);border-radius:18px;padding:36px;width:360px;max-width:95vw;}
h1{font-family:'Unbounded',sans-serif;font-size:18px;color:var(--ac);margin-bottom:4px;}
h1 span{color:var(--ac2);}
.sub{font-size:11px;color:var(--mu);margin-bottom:28px;}
label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;}
input{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:8px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 14px;outline:none;margin-bottom:14px;transition:.2s;}
input:focus{border-color:var(--ac);}
button{width:100%;background:var(--ac);color:#000;border:none;border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;margin-top:4px;}
button:hover{background:#00c4d9;transform:translateY(-1px);}
.flash{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;background:rgba(255,51,102,.12);border:1px solid rgba(255,51,102,.3);color:var(--rd);}
.hint{font-size:10px;color:var(--mu);text-align:center;margin-top:16px;}
</style>
</head>
<body>
<div class="box">
  <h1>📱 Склад <span>Телефонов</span></h1>
  <div class="sub">Введите данные для входа</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash">{{ msg }}</div>
  {% endfor %}
  {% endwith %}
  <form method="POST">
    <label>Логин</label>
    <input type="text" name="username" placeholder="admin" required autofocus>
    <label>Пароль</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">Войти</button>
  </form>
  <div class="hint">По умолчанию: admin / admin123</div>
</div>
</body>
</html>

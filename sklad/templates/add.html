{% extends 'base.html' %}
{% block title %}Добавить телефон{% endblock %}
{% block content %}
<div class="card">
  <h2>➕ Добавить телефон на склад</h2>
  <form method="POST">
    <div class="form-grid">
      <div>
        <label>Бренд *</label>
        <select name="brand" required>
          <option value="">Выберите бренд</option>
          {% for b in ['Apple','Samsung','Xiaomi','Huawei','OPPO','Vivo','OnePlus','Realme','Nokia','Другой'] %}
          <option>{{ b }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Модель *</label>
        <input type="text" name="model" placeholder="iPhone 15 Pro, Galaxy S24..." required>
      </div>
      <div>
        <label>IMEI</label>
        <input type="text" name="imei" placeholder="15 цифр" maxlength="15">
      </div>
      <div>
        <label>Цвет</label>
        <input type="text" name="color" placeholder="Чёрный, белый...">
      </div>
      <div>
        <label>Память (GB)</label>
        <select name="storage">
          <option value="">—</option>
          {% for s in ['64','128','256','512','1024'] %}
          <option>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Состояние</label>
        <select name="condition">
          <option>Новый</option>
          <option>Б/У - отличное</option>
          <option>Б/У - хорошее</option>
          <option>Б/У - среднее</option>
        </select>
      </div>
      <div>
        <label>Цена закупки (₽) *</label>
        <input type="number" name="cost_price" placeholder="0" required step="0.01">
      </div>
      <div>
        <label>Цена продажи (₽) *</label>
        <input type="number" name="sell_price" placeholder="0" required step="0.01">
      </div>
      <div>
        <label>Дата поступления</label>
        <input type="date" name="added_date" value="{{ today }}">
      </div>
      <div>
        <label>Поставщик</label>
        <input type="text" name="supplier" placeholder="Название поставщика">
      </div>
      <div>
        <label>Заметки</label>
        <input type="text" name="notes" placeholder="Дополнительная информация...">
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:12px;">
      <button class="btn btn-ac" type="submit">Добавить на склад</button>
      <a href="{{ url_for('stock') }}" class="btn" style="background:var(--s2);color:var(--mu);border:1px solid var(--b);">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
